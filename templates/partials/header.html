<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/">
      <img class="brand-logo" src="https://vithiorg.com/templates/default/images/VithiOrg_Logo.png" alt="Vithi Organics logo" />
    </a>
    <div class="logo-popup" aria-hidden="true">
      <img src="https://vithiorg.com/templates/default/images/VithiOrg_Logo.png" alt="Vithi Organics logo large" />
    </div>
    <div class="mobile-search">
      <button class="mobile-search-toggle" aria-label="Open search">🔍</button>
      <form class="mobile-search-form" role="search" method="get" action="$search_action">
        <input class="mobile-search-input" type="search" name="q" value="$search_query" placeholder="Search products" aria-label="Search products" />
        <button type="button" class="mobile-search-close" aria-label="Close search">✕</button>
      </form>
    </div>
    <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-nav" aria-label="Primary navigation">
      <a href="/">Home</a>
      <a href="/#categories">Categories</a>
      <a href="/#best-sellers">Shop</a>
      <a href="/#about">About</a>
      <a href="/#contact">Contact</a>
    </nav>
    <div class="header-actions">
      <form class="search-box" role="search" method="get" action="$search_action">
        <input type="search" name="q" value="$search_query" placeholder="Search products" aria-label="Search products" />
        <button type="submit" aria-label="Search">⌕</button>
      </form>
      <a href="$login_href" class="icon-link">$login_label</a>
      $auth_secondary
      <a href="/wishlist" class="icon-link">Wishlist</a>
      <a href="/cart" class="icon-link">Cart</a>
    </div>
  </div>
</header>
