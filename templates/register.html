<main class="section container">
  <div class="login-shell">
    <div class="login-card">
      <p class="eyebrow">Join Us</p>
      <h1>Create Your Account</h1>
      <p class="login-copy">Get started with Vithi Organics and enjoy organic wellness delivered to you.</p>
      $error_block
      <form class="auth-form" method="POST" action="/register">
        <label for="fullname">Full Name</label>
        <input id="fullname" name="fullname" type="text" placeholder="John Doe" value="$fullname" required />
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" value="$email" required />
        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" type="tel" placeholder="+91 98765 43210" value="$phone" />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Create a strong password" required />
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" placeholder="Re-enter your password" required />
        <label for="captcha_answer">Image Captcha</label>
        <input type="hidden" name="captcha_expected" value="$captcha_expected" />
        <div class="login-captcha-wrap">
          <img class="login-captcha-image" src="$captcha_image" alt="Registration captcha image" />
          <input id="captcha_answer" name="captcha_answer" type="text" placeholder="Enter characters shown" autocomplete="off" required />
        </div>
        <button type="submit" class="btn btn-primary auth-btn">Create Account</button>
      </form>
      <p class="switch-auth">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>
</main>
