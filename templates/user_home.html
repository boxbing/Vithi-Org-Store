<main class="section container user-home-page">
  <div class="user-home-shell">
    <section class="user-profile-card">
      <p class="eyebrow">Welcome</p>
      <h1>$user_name_full</h1>
      $message_block
      <div class="profile-meta">
        <p><strong>Email:</strong> $user_email</p>
        <p><strong>Phone:</strong> $user_phone</p>
      </div>
      <div class="profile-chips">
        <span class="badge">Verified Account</span>
        <span class="badge">Secure Checkout</span>
      </div>
      <form class="auth-form" method="POST" action="/user/address">
        <label for="address">Delivery Address</label>
        <textarea id="address" name="address" rows="4" placeholder="Enter your full address">$address_value</textarea>
        <button type="submit" class="btn btn-primary auth-btn">Save Address</button>
      </form>
    </section>

    <section class="user-orders-card">
      <p class="eyebrow">Order History</p>
      <h2>Previous Orders</h2>
      $order_rows
      <div class="user-quick-actions">
        <a class="btn btn-primary" href="/">Continue Shopping</a>
        <a class="btn btn-secondary" href="/orders">View All Orders</a>
      </div>
    </section>
  </div>

  <section class="user-support-card">
    <h2>Account Shortcuts</h2>
    <div class="user-support-links">
      <a href="/wishlist">My Wishlist</a>
      <a href="/cart">My Cart</a>
      <a href="/orders">Order History</a>
    </div>
  </section>

  $recently_viewed_block
</main>
